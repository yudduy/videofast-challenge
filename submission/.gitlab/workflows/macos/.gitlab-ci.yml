#
# MacOS CI jobs
#

#
# Anchors
#

.macos-compiler-base:
  extends: .common-ci-base
  stage: compile
  dependencies: []
  tags:
    - macos
    - shell
  variables:
    !reference [.compiler-variables]
  script: !reference [.compiler-script]

.macos-test-base:
  extends: .common-ci-base
  stage: test
  tags:
    - macos
    - shell
    - x86
  before_script:
    - |
      for file in $TEST_FILES; do
        curl -fLs "https://gitlab.com/AOMediaCodec/aom-testing/-/raw/master/test-files/$file.zst" | zstd -d - -o "$file"
      done

.macos-unit-test-base:
  extends: .macos-test-base
  tags:
    - macos
    - shell
    - x86
  artifacts:
    when: always
    reports:
      junit: reports/*.xml

#
# Compile jobs
#

# Xcode compilation test
macOS (Xcode):
  extends: .macos-compiler-base
  stage: standalone
  tags:
    - macos
    - shell
    - x86 # limit to x86 only for now.
  variables:
    CMAKE_GENERATOR: Xcode

# Universal binary compilation test
macOS (Static, Tests, Universal):
  extends: .macos-compiler-base
  tags:
    - macos
    - shell
    - m1
  variables:
    CMAKE_GENERATOR: Ninja
    BASE_EXTRA_CMAKE_FLAGS: -DBUILD_TESTING=ON -DSVT_AV1_LTO=ON # Cannot use -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" directly, instead call lipo at the end
    EXTRA_CFLAGS: -Wno-error -g
    EXTRA_CXXFLAGS: -Wno-error -g
    PREFIX_DIR: ${CI_PROJECT_DIR}/SVT-Install/
  parallel:
    matrix:
      - CMAKE_BUILD_TYPE: [Release, Debug]
  script:
    - EXTRA_CMAKE_FLAGS="${BASE_EXTRA_CMAKE_FLAGS} -DCMAKE_OSX_ARCHITECTURES=arm64"
    - !reference [.compiler-script]
    - mv Bin/${CMAKE_BUILD_TYPE} Bin/${CMAKE_BUILD_TYPE}-arm64
    - git -C Build clean -ffdx
    - EXTRA_CMAKE_FLAGS="${BASE_EXTRA_CMAKE_FLAGS} -DCMAKE_OSX_ARCHITECTURES=x86_64"
    - !reference [.compiler-script]
    - mv Bin/${CMAKE_BUILD_TYPE} Bin/${CMAKE_BUILD_TYPE}-x86_64
    - mkdir -p Bin/${CMAKE_BUILD_TYPE}
    - for file in Bin/${CMAKE_BUILD_TYPE}-arm64/*; do
        lipo -create "Bin/${CMAKE_BUILD_TYPE}-arm64/$(basename $file)" "Bin/${CMAKE_BUILD_TYPE}-x86_64/$(basename $file)" -output "Bin/${CMAKE_BUILD_TYPE}/$(basename $file)";
      done
    - ccache -s
  artifacts:
    expire_in: 1 day
    paths:
      - Bin/Release/* # We only care about getting the release binaries since debug mode is too slow to do anything with.
      - SVT-Install/*

#
# Test jobs
#

macOS Unit Tests:
  extends: .macos-unit-test-base
  variables:
    SVT_AV1_TEST_VECTOR_PATH: $CI_PROJECT_DIR/test/vectors
    TOTAL_SHARDS: 4
  parallel:
    matrix:
      - SHARD_INDEX: [0, 1, 2, 3]
  cache:
    key: testvectors
    paths:
      - test/vectors
    policy: pull-push
  before_script:
    - curl -Ls "https://raw.githubusercontent.com/1480c1/gtest-parallel/unique_id/gtest_parallel.py" > gtest_parallel.py
  script:
    - cmake -B Build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
    - cmake --build Build --target TestVectors
    - python3 gtest_parallel.py --print_test_times --shard_index=$SHARD_INDEX --shard_count=$TOTAL_SHARDS ./Bin/Release/SvtAv1UnitTests ./Bin/Release/SvtAv1E2ETests -- --gtest_output="xml:reports/{#}.xml"
  needs:
    - macOS (Static, Tests, Universal)

